version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME:-phishguard_db}
      - POSTGRES_USER=${DB_USER:-ismailkhan}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
    ports:
      - "5432:5432"

  backend:
    build: ./phishguard-backend
    volumes:
      - ./phishguard-backend:/app
    environment:
      - DEBUG=True
      - DB_NAME=${DB_NAME:-phishguard_db}
      - DB_USER=${DB_USER:-ismailkhan}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_HOST=db
      - DB_PORT=5432
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-default}
      - ALLOWED_HOSTS=backend localhost 127.0.0.1
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./phishguard-app
    volumes:
      - ./phishguard-app:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
